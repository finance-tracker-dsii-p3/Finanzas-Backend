name: Finanzas Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DJANGO_SETTINGS_MODULE: proyecto_financiero.settings.testing
  SECRET_KEY: test-secret-key-for-ci-only-not-for-production
  DEBUG: False

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencias pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Crear entorno virtual
        run: |
          python -m venv venv
          source venv/bin/activate
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear directorios necesarios
        run: |
          mkdir -p logs media static staticfiles
          touch logs/.gitkeep media/.gitkeep static/.gitkeep

      - name: Configurar archivo .env para CI
        run: |
          cp .env.example .env
          echo "" >> .env
          echo "# CI Configuration" >> .env
          echo "DJANGO_SETTINGS_MODULE=proyecto_financiero.settings.testing" >> .env
          echo "SECRET_KEY=test-secret-key-for-ci-only" >> .env
          echo "DEBUG=False" >> .env

      - name: Verificar configuración Django
        run: |
          python manage.py check --deploy --settings=proyecto_financiero.settings.testing

      - name: Crear migraciones si es necesario
        run: |
          python manage.py makemigrations --settings=proyecto_financiero.settings.testing --dry-run --check

      - name: Aplicar migraciones
        run: |
          python manage.py migrate --settings=proyecto_financiero.settings.testing --run-syncdb

      - name: Ejecutar collectstatic
        run: |
          python manage.py collectstatic --noinput --settings=proyecto_financiero.settings.testing

      - name: Ejecutar tests
        run: |
          python manage.py test --verbosity=2 --settings=proyecto_financiero.settings.testing

      - name: Verificar imports críticos
        run: |
          python -c "
          import django
          django.setup()
          print(f'✅ Django {django.get_version()} configurado correctamente')
          
          # Test imports críticos
          from proyecto_financiero.settings.testing import *
          print('✅ Settings de testing cargados')
          
          from django.contrib.auth.models import User
          print('✅ Modelos de Django importados')
          "

      - name: Verificar sintaxis con flake8 (opcional)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,migrations,__pycache__
