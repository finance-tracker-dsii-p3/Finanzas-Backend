name: Finanzas Backend CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencias pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Crear entorno virtual
        run: |
          python -m venv venv
          source venv/bin/activate
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Copiar archivo .env
        run: |
          cp .env.example .env
          echo "DJANGO_SETTINGS_MODULE=proyecto_financiero.settings.testing" >> .env
          echo "SECRET_KEY=test-secret-key-for-ci-only" >> .env

      - name: Ejecutar migraciones
        run: |
          python manage.py makemigrations --dry-run --check
          python manage.py migrate

      - name: Ejecutar tests
        env:
          DJANGO_SETTINGS_MODULE: proyecto_financiero.settings.testing
        run: |
          python manage.py test --verbosity=2

      - name: Verificar sintaxis con flake8 (opcional)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
